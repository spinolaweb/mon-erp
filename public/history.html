<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique — ERP E-Commerce Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
<aside class="sidebar">
<div class="brand">
<div class="brand-icon"><i class="fas fa-chart-line"></i></div>
<div><div class="brand-title">ERP E-Commerce</div><div class="brand-sub">Profit Calculator</div></div>
</div>
<nav class="nav">
<a href="index.html" class="nav-item"><i class="fas fa-home nav-icon"></i> Tableau de Bord</a>
<a href="entry.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i> Nouvelle Entrée</a>
<a href="history.html" class="nav-item active"><i class="fas fa-history nav-icon"></i> Historique</a>
<a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar nav-icon"></i> Analytiques</a>
<a href="settings.html" class="nav-item"><i class="fas fa-cog nav-icon"></i> Paramètres</a>
</nav>
<div class="rate-badge">
<p>Taux de Change</p>
<h4>1 USD = <span id="sidebar-rate">250</span> DZD</h4>
</div>
</aside>
<main class="main">
<header class="header">
<div class="page-title">
<h1>Historique</h1>
<p>Toutes vos entrées passées</p>
</div>
<div class="header-actions">
<a href="/api/export" onclick="event.preventDefault(); API.exportCSV();" class="btn btn-outline btn-sm"><i class="fas fa-download"></i> Exporter CSV</a>
<div id="conn-status" class="status status-online"><span class="status-dot"></span> Backend Online</div>
</div>
</header>
<div class="content fade-in">
<div class="card">
<div class="card-header" style="flex-wrap:wrap;gap:12px;">
<h3 class="card-title">Historique Complet</h3>
<div style="display:flex;gap:8px;align-items:center;">
<input type="text" id="search-history" placeholder="Rechercher..." class="form-input" style="width:220px;" oninput="renderHistory()">
<button onclick="clearAll()" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i> Tout Supprimer</button>
</div>
</div>
<div class="table-wrap">
<table class="table">
<thead><tr>
<th>Date</th><th>Campagne</th><th style="text-align:center">Cmd</th><th style="text-align:center">Livr</th>
<th style="text-align:right">Revenus</th><th style="text-align:right">Dépenses</th>
<th style="text-align:right">Profit</th><th style="text-align:center">ROAS</th><th style="text-align:center">Actions</th>
</tr></thead>
<tbody id="history-table">
<tr><td colspan="9" class="empty"><i class="fas fa-inbox"></i><br>Aucune entrée trouvée</td></tr>
</tbody>
</table>
</div>
</div>
</div>
</main>
</div>
<script src="/js/calculator.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>

<script>
let allEntries = [];
let currentSettings = {};

async function loadHistory() {
    currentSettings = await UI.loadSettings();
    allEntries = await API.getEntries();
    renderHistory();
}

function renderHistory() {
    const search = document.getElementById('search-history').value.toLowerCase();
    const filtered = allEntries.filter(e => e.campaign.toLowerCase().includes(search) || e.date.includes(search));
    const tbody = document.getElementById('history-table');
    const rate = currentSettings.exchangeRate || 250;

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty"><i class="fas fa-inbox"></i><br>Aucune entrée trouvée</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(e => {
        const m = Calculator.compute(e, rate);
        return `<tr>
            <td>${e.date}</td>
            <td>${e.campaign}</td>
            <td style="text-align:center">${UI.formatNum(m.orders, 0)}</td>
            <td style="text-align:center;color:var(--success);font-weight:600">${UI.formatNum(m.delivered, 0)}</td>
            <td style="text-align:right;font-weight:600">$${UI.formatNum(m.revenue, 2)}</td>
            <td style="text-align:right;color:var(--danger)">$${UI.formatNum(m.adSpend, 2)}</td>
            <td style="text-align:right;font-weight:700;color:${m.profit>=0?'#059669':'var(--danger)'}">$${UI.formatNum(m.profit, 2)}</td>
            <td style="text-align:center"><span class="badge ${m.roas>=m.breakEvenRoas?'badge-green':'badge-red'}">${UI.formatNum(m.roas, 2)}X</span></td>
            <td style="text-align:center"><button onclick="deleteEntry(${e.id})" class="btn btn-sm btn-danger" style="padding:4px 10px;"><i class="fas fa-trash-alt"></i></button></td>
        </tr>`;
    }).join('');
}

async function deleteEntry(id) {
    await API.deleteEntry(id);
    UI.toast('Entrée supprimée');
    loadHistory();
}

async function clearAll() {
    if (!confirm('Êtes-vous sûr de vouloir supprimer TOUTES les entrées ?')) return;
    for (const e of [...allEntries]) await API.deleteEntry(e.id);
    UI.toast('Toutes les données ont été supprimées');
    loadHistory();
}

document.addEventListener('DOMContentLoaded', loadHistory);
</script>

</body>
</html>
